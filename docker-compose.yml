version: '3.8'

services:
  # PHP-FPM Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 1n2music-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./.env:/var/www/html/.env:ro
      - ./app:/var/www/html/app
      - ./config:/var/www/html/config
      - ./resources:/var/www/html/resources
      - uploads_data:/var/www/html/public/uploads
      - storage_data:/var/www/html/storage
    networks:
      - app-network
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-sync}

  # Nginx Web Server Service
  webserver:
    image: nginx:alpine
    container_name: 1n2music-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/html/public:ro
      - uploads_data:/var/www/html/public/uploads
    networks:
      - app-network
    depends_on:
      - app

  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: 1n2music-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-1n2music}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    command: --default-authentication-plugin=mysql_native_password

  # Redis Cache Service
  redis:
    image: redis:alpine
    container_name: 1n2music-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    networks:
      - app-network

# Named Volumes for Data Persistence
volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  storage_data:
    driver: local

# Internal Docker Network
networks:
  app-network:
    driver: bridge
