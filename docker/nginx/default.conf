server {
    listen 80;
    server_name localhost;

    # Document root - Laravel public directory
    root /var/www/html/public;

    # Index files
    index index.php index.html;

    # Client max body size for large file uploads
    client_max_body_size 100M;

    # Charset
    charset utf-8;

    # Main location block
    location / {
        # Laravel routing - try files with fallback to index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle /public/uploads/ URLs (legacy compatibility)
    location ~ ^/public/uploads/(.*)$ {
        alias /var/www/html/public/uploads/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Handle /public/assets/ URLs (legacy compatibility)
    location ~ ^/public/assets/(.*)$ {
        alias /var/www/html/public/assets/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        # FastCGI pass to PHP-FPM container
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        # FastCGI parameters
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Additional FastCGI settings
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;

        # Timeouts for long-running requests
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Logging
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
